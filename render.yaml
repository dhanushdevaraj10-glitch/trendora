services:
  - type: web
    name: trendora
    env: python
    plan: free
    buildCommand: "python -m pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn dhanush.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: trendora.onrender.com
