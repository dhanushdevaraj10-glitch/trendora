services:
  - type: web
    name: trendora
    env: python
    plan: free
    buildCommand: "python -m pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && gunicorn dhanush.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: trendora-shoppp.onrender.com,trendora.onrender.com,127.0.0.1,localhost
      - key: DATABASE_URL
        fromDatabase:
          name: trendora-db
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false

databases:
  - name: trendora-db
    plan: free
    databaseName: trendora
    user: trendora
